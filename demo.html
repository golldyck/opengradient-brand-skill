<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenGradient — Demo</title>
    <meta name="description" content="OpenGradient Brand Skill v3.0 Demo" />

    <!--
      OpenGradient Brand Skill — 1 line to brand any project
      Docs: github.com/golldyck/opengradient-brand-skill
    -->
    <script src="https://cdn.jsdelivr.net/gh/golldyck/opengradient-brand-skill@main/og-skill.js"></script>
  </head>

  <!--
    Add data-og-build to <body> for a full auto-built page.
    Optional attributes:
      data-og-title     — hero headline
      data-og-tagline   — hero subtext
      data-og-cta       — CTA button label
      data-og-cta-url   — CTA button href
  -->
  <body
    data-og-build
    data-og-title="OpenGradient"
    data-og-tagline="The open platform for decentralized AI inference — run, verify, and monetize machine learning models on-chain."
    data-og-cta="Enter Model Hub"
    data-og-cta-url="https://opengradient.ai"
  >
    <noscript>Please enable JavaScript to view this page.</noscript>
  </body>
</html>
