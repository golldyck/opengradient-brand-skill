<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>OpenGradient — Demo</title>
    <meta name="description" content="OpenGradient Brand Skill Demo Page" />
  
    <!--
      ╔══════════════════════════════════════════════════════╗
      ║   OpenGradient Brand Skill — DEMO                   ║
      ║   Just paste these 2 lines into any HTML page:       ║
      ╚══════════════════════════════════════════════════════╝
  
      OPTION A — Full auto-build (replaces body content):
      Add data-og-build to your <body> tag, then drop the script.
  
      OPTION B — CSS-only, use brand classes manually.
    -->
  
    <!-- 1. Load the skill (auto-fetches CSS + fonts from GitHub CDN) -->
    <script src="https://cdn.jsdelivr.net/gh/golldyck/opengradient-brand-skill@main/og-skill.js"></script>
  </head>

<!--
  2. Add data-og-build to <body>.
     Customise with optional attributes:
       data-og-title    — hero headline
       data-og-tagline  — hero subtext
       data-og-cta      — CTA button label
       data-og-cta-url  — CTA button link
-->
<body
    data-og-build
    data-og-title="OpenGradient"
    data-og-tagline="The open platform for decentralized AI inference — run, verify, and monetize machine learning models on-chain."
    data-og-cta="Enter Model Hub"
    data-og-cta-url="https://opengradient.ai"
  >
    <!-- The skill auto-replaces this content with a full branded page -->
    <noscript>Please enable JavaScript to view this page.</noscript>
</body>
